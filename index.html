<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- TITLE -->
  <title>Emre Usul | QA Engineer & SDET | Test Automation Portfolio</title>

  <!-- META DESCRIPTION -->
  <meta name="description" content="Portfolio of Emre Usl, QA Engineer & SDET specializing in test automation, CI/CD, and software quality engineering.">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e0e7ff);
      color: #111;
      overflow-x: hidden;
    }

    /* BACKGROUND CANVAS */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    /* LOG OVERLAY */
    .log-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      font-family: monospace;
      font-size: 12px;
      color: rgba(0,0,0,0.08);
      pointer-events: none;
      padding: 20px;
      line-height: 1.6;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 20px;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #6366f1;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 3.5rem;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      margin-top: 20px;
      opacity: 0.7;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    /* CARDS */
    .cards {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      width: 260px;
      padding: 25px;
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(99,102,241,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 20px 50px rgba(99,102,241,0.3);
    }

  </style>
</head>
<body>

  <!-- ANIMATED BACKGROUND -->
  <canvas id="bg"></canvas>
  <div class="log-overlay"></div>

  <!-- NAV -->
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="showcase.html">Showcase</a>
    <a href="blog.html">Blog</a>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>QA Engineer / SDET / Test Automation</h1>
    <p>
      Söz uçar, log kalır.<br>
      I turn bugs into knowledge.
    </p>
  </section>

  <!-- CARDS -->
  <section class="cards">
    <a href="about.html" class="card">
      <h2>👨‍💻 About Me</h2>
      <p>Who I am and my QA mindset</p>
    </a>

    <a href="showcase.html" class="card">
      <h2>🚀 Showcase</h2>
      <p>Automation & testing projects</p>
    </a>

    <a href="blog.html" class="card">
      <h2>📚 Blog</h2>
      <p>Notes, learnings & insights</p>
    </a>
  </section>

  <!-- ANIMATION SCRIPT -->
  <script>
    const logContainer = document.querySelector(".log-overlay");

    const logs = [
      "[ RUNNING ] login_test",
      "[ PASS ] checkout_test",
      "[ FAIL ] payment_test",
      "[ RUNNING ] api_test",
      "Retrying...",
      "AssertionError: expected 200",
      "[ PASS ] user_flow",
      "[ RUNNING ] regression_suite"
    ];

    function createLogLine() {
      const el = document.createElement("div");
      el.textContent = logs[Math.floor(Math.random() * logs.length)];

      el.style.position = "absolute";
      el.style.left = Math.random() * 100 + "%";
      el.style.top = "100%";

      logContainer.appendChild(el);

      let y = window.innerHeight;

      function move() {
        y -= 0.5;
        el.style.top = y + "px";

        if (y > -20) {
          requestAnimationFrame(move);
        } else {
          el.remove();
        }
      }

      move();
    }

    setInterval(createLogLine, 800);
  </script>

</body>
</html>
